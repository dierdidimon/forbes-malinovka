<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Список Forbes — Малиновка RP</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bg-pattern"></div>

<header class="hero">
  <img class="logo-img" src="img/logo.png" alt="Малиновка">
  <h1 class="title">СПИСОК <span class="accent">FORBES</span></h1>
  <div class="edition-selector">
    <label>Редакция:</label>
    <select id="editionSelect"></select>
  </div>
</header>

<main class="container">
  <table class="forbes-table" id="forbesTable">
    <thead>
      <tr>
        <th class="col-rank">#</th>
        <th class="col-name">Игрок</th>
        <th class="col-total">Состояние</th>
      </tr>
    </thead>
    <tbody id="forbesBody"></tbody>
  </table>

  <div class="empty" id="emptyState" hidden>
    <p>В этой редакции пока нет игроков.</p>
  </div>
</main>

<dialog id="playerModal" class="player-modal">
  <button class="modal-close" id="modalClose">×</button>
  <div id="modalBody"></div>
</dialog>

<footer class="footer">
  <span>Forbes Malinovka RP</span>
</footer>

<script src="app.js"></script>
</body>
</html>
